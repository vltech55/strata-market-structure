[uwsgi]
# ──────────────────────────────────────────────────────────────────────────────
# Production uWSGI configuration for the Strata Django backend.
# ──────────────────────────────────────────────────────────────────────────────

# App
chdir            = /app/backend
module           = strata.wsgi:application
env              = DJANGO_SETTINGS_MODULE=strata.settings

# Server
http             = 0.0.0.0:8000
http-keepalive   = 1
add-header       = Connection: Keep-Alive
buffer-size      = 32768

# Process model — pre-forked workers, threaded for ORM-friendly concurrency.
master           = true
processes        = 4
threads          = 4
enable-threads   = true
single-interpreter = true
lazy-apps        = true

# Reliability
harakiri              = 60          # kill workers blocked >60s
harakiri-verbose      = true
max-requests          = 5000        # recycle workers to avoid memory creep
max-requests-delta    = 500
reload-on-rss         = 768         # MB — recycle if a worker grows too large
worker-reload-mercy   = 30
listen                = 256

# Static files (served by a CDN/reverse-proxy in real prod; collectstatic still useful)
static-map       = /static=/app/backend/staticfiles

# Logging
log-format       = %(addr) %(method) %(uri) → %(status) %(rsize)B in %(msecs)ms (%(pid))
log-master       = true
disable-logging  = false
log-4xx          = true
log-5xx          = true

# Stats endpoint (scraped by Prometheus uwsgi-exporter sidecar in real prod)
stats            = 0.0.0.0:9191
stats-http       = true

# Graceful shutdown for k8s/compose SIGTERM
die-on-term      = true
need-app         = true
vacuum           = true
